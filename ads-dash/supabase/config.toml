# Supabase project config. Ver: https://supabase.com/docs/guides/cli/config

project_id = "ads-dash"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Edge functions (criar em ./functions/<nome>/index.ts)
[functions.send-report]
verify_jwt = true

[functions.instagram-sync]
verify_jwt = false

[functions.gemini-analyze]
verify_jwt = false

[functions.gemini-instagram-insights]
verify_jwt = false

[functions.gemini-tiktok-insights]
verify_jwt = false

[functions.gemini-youtube-insights]
verify_jwt = false

[functions.whatsapp-send]
verify_jwt = false
